<!DOCTYPE html>
<html>
<head>
<style>

body {
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#963115,#d96c3d);
}



.b{
    display:flex;
    gap:15px;
    padding:12px 25px;
    margin-bottom:35px;
    border-radius:50px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.b a{
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.15);
    padding:10px 22px;
    border-radius:30px;
    font-size:17px;
    font-weight:bold;
    transition:.3s;
}

.b a:hover{
    background:white;
    color:#963115;
    transform:translateY(-4px);
}


/* School Card */
.a{
    width:450px;
    background:white;
    padding:35px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
}


.a h1{
    margin:0;
    color:#0047AB;
    font-size:40px;
}


.a h2{
    color:#E63946;
    margin:15px 0 25px;
    font-size:30px;
}


.a p{
    font-size:20px;
    color:#444;
    margin:12px 0;
}


.details{
    color:#0047AB;
    font-weight:bold;
    font-size:24px;
    margin-top:20px;
}


.a button{
    margin-top:25px;
    padding:14px 35px;
    background:#0047AB;
    color:white;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}


.a button:hover{
    background:#002f73;
    transform:scale(1.05);
}

</style>
</head>

<body>


<div class="b">
    <a href="index.html">task 1</a>
    <a href="task2.html">task 2</a>
    <a href="task3.html">task 3</a>
</div>



<div class="a">

    <h1>🏫 ABC SCHOOL</h1>

    <h2>Admission Open 2026</h2>

    <p>📚 Quality Education For Bright Future</p>

    <p class="details">Admission Details</p>

    <p>🎓 Classes: Grade 1 to Grade 10</p>

    <p>📅 Last Date: 20 July 2026</p>


    <button>Apply Now</button>

</div>


</body>
</html>
